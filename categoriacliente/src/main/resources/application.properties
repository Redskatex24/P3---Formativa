spring.application.name=categoriascl
spring.datasource.url=jdbc:mysql://localhost:3307/db_categoriascl?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=my-secret-pw
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.flyway.enabled=true
spring.flyway.repair=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
logging.level.root=info
logging.level.com.duoc.categoriacliente=info
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} {%thread} %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/categoriscl.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.longback.rollingpolicy.max-history=7
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-url.path=/doc/swagger-ui.html
server.port=8081
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

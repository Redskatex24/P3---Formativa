server.port=8080
spring.application.name=gateway

# Configuraciµn de la ruta corregida
spring.cloud.gateway.routes[0].id=ruta-clientes
spring.cloud.gateway.routes[0].uri=lb://CLIENTES
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/**

# Conexiµn a Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/





